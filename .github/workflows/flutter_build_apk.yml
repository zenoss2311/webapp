# .github/workflows/flutter_build_apk.yml
name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file Flutter project'
        required: true
        type: string
      tag:
        description: 'Build tag'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Setup environment
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # Step 2: Download and extract project
      - name: Download and extract project
        run: |
          echo "📥 Downloading project from: ${{ inputs.zip_url }}"
          curl -L -o project.zip "${{ inputs.zip_url }}"
          
          # Cek apakah file ZIP valid
          echo "🔍 Validating ZIP file..."
          if ! file project.zip | grep -q "Zip archive"; then
            echo "❌ File is not a valid ZIP archive!"
            file project.zip
            exit 1
          fi
          
          # Cek ukuran file
          SIZE=$(du -h project.zip | cut -f1)
          echo "📏 ZIP size: $SIZE"
          
          mkdir -p project
          
          # Extract dengan verbose
          echo "📦 Extracting ZIP..."
          unzip -v project.zip | head -20
          
          if ! unzip -q project.zip -d project/; then
            echo "❌ Failed to extract ZIP!"
            exit 1
          fi
          
          echo "📂 Files extracted:"
          ls -la project/
          
          # Cek pubspec.yaml
          if [ ! -f "project/pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            echo "📂 Files in root:"
            ls -la project/
            exit 1
          fi
          
          # Copy project ke workspace
          cp -r project/* ./
          rm -rf project project.zip

      # Step 3: Flutter clean & get dependencies
      - name: Flutter clean
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      # Step 4: Generate build files (if needed)
      - name: Generate build files
        run: |
          # Cek apakah ada build_runner
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs || true
          fi

      # Step 5: Analyze project
      - name: Analyze project
        run: |
          flutter analyze || true

      # Step 6: Build APK
      - name: Build APK
        run: |
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      # Step 7: Verify APK
      - name: Verify APK
        run: |
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found: $APK_PATH"
            ls -la "$APK_PATH"
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "📏 APK size: $APK_SIZE"
          else
            echo "❌ APK not found!"
            find build/app/outputs -name "*.apk" -type f || true
            exit 1
          fi

      # Step 8: Upload APK as Artifact
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            !build/app/outputs/flutter-apk/*.apk.sha1
          retention-days: 7
          if-no-files-found: error

      # Step 9: Upload to Release
      - name: Upload to Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          
          echo "📤 Uploading $APK_NAME ($APK_SIZE) to release..."
          
          # Get release ID from tag
          RELEASE_RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ inputs.tag }}")
          
          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')
          
          # If release not found, create new release
          if [ "$RELEASE_ID" == "null" ]; then
            echo "⚠️ Release not found, creating new release..."
            
            RELEASE_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"${{ inputs.tag }}\",\"name\":\"Build ${{ inputs.tag }}\",\"draft\":false,\"prerelease\":true}" \
              "https://api.github.com/repos/${{ github.repository }}/releases")
            
            RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq -r '.id')
            UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')
          fi
          
          if [ "$RELEASE_ID" == "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "❌ Failed to get release info!"
            exit 1
          fi
          
          # Upload APK to release
          echo "📤 Uploading to: $UPLOAD_URL?name=$APK_NAME"
          
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$APK_PATH" \
            "$UPLOAD_URL?name=$APK_NAME"
          
          echo "✅ APK uploaded to release!"

      # Step 10: Summary
      - name: Summary
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | ${{ inputs.build_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ inputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "| APK Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| APK Path | $APK_PATH |" >> $GITHUB_STEP_SUMMARY
          fi
