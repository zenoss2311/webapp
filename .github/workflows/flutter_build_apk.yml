name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file project Flutter'
        required: true
        type: string
      tag:
        description: 'Tag build'
        required: false
        type: string
        default: 'build-manual'
      build_type:
        description: 'Tipe build'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'release'

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download project ZIP
        run: |
          echo "📥 Downloading from: ${{ inputs.zip_url }}"
          curl -L -o project.zip "${{ inputs.zip_url }}"
          if [ ! -f project.zip ]; then
            echo "❌ Failed to download"
            exit 1
          fi
          echo "✅ Downloaded: $(ls -lh project.zip)"

      - name: Extract project (Fix ZIP extra bytes)
        run: |
          mkdir -p project
          
          # Python script untuk handle ZIP dengan extra bytes
          python3 << 'PYTHON_SCRIPT'
          import zipfile
          import os
          
          zip_path = "project.zip"
          extract_path = "project/"
          
          # Baca file
          with open(zip_path, 'rb') as f:
              data = f.read()
          
          # Cari signature ZIP
          start = data.find(b'PK\x03\x04')
          if start > 0:
              print(f"⚠️ Found {start} extra bytes, cleaning...")
              clean_data = data[start:]
              clean_zip = "project_clean.zip"
              with open(clean_zip, 'wb') as f:
                  f.write(clean_data)
              zip_path = clean_zip
          
          # Extract
          try:
              with zipfile.ZipFile(zip_path, 'r') as zip_ref:
                  zip_ref.extractall(extract_path)
                  print(f"✅ Extracted {len(zip_ref.namelist())} files")
          except zipfile.BadZipFile:
              print("❌ Still bad zip, trying fallback...")
              os.system(f"unzip -o -q {zip_path} -d {extract_path}")
          
          # Cleanup
          if os.path.exists("project_clean.zip"):
              os.remove("project_clean.zip")
          if os.path.exists("project.zip"):
              os.remove("project.zip")
          PYTHON_SCRIPT
          
          echo "📂 Extracted files:"
          ls -la project/

      - name: Validate Flutter project
        run: |
          cd project
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            ls -la
            exit 1
          fi
          echo "✅ Flutter project validated"

      - name: Get dependencies
        run: |
          cd project
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Build APK
        id: build
        run: |
          cd project
          
          if [ "${{ inputs.build_type }}" == "release" ]; then
            echo "🚀 Building RELEASE APK..."
            flutter build apk --release --split-per-abi
          else
            echo "🐞 Building DEBUG APK..."
            flutter build apk --debug
          fi
          
          # Cek hasil
          if [ "${{ inputs.build_type }}" == "release" ]; then
            APK_PATH="build/app/outputs/apk/release"
          else
            APK_PATH="build/app/outputs/apk/debug"
          fi
          
          if [ -d "$APK_PATH" ] && [ "$(ls -A $APK_PATH)" ]; then
            echo "✅ Build successful!"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            ls -la $APK_PATH
          else
            echo "❌ Build failed - no APK found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: project/${{ steps.build.outputs.apk_path }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: inputs.tag != 'build-manual'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          name: Build ${{ inputs.tag }}
          body: |
            ## Flutter APK Build
            - **Type:** ${{ inputs.build_type }}
            - **Tag:** ${{ inputs.tag }}
          files: project/${{ steps.build.outputs.apk_path }}/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
