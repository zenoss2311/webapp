name: Build Flutter APK (zip path OR url)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "ID job dari Telegram (dipetakan dari 'tag' di server.js)"
        required: true
      zip_path:
        description: "Path zip di repo (mis: uploads/xxx.zip). Kosongkan jika pakai zip_url"
        required: false
        default: ""
      zip_url:
        description: "Direct URL zip. Kosongkan jika pakai zip_path"
        required: false
        default: ""
      build_type:
        description: "debug atau release"
        required: false
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare workspace
        run: |
          set -e
          mkdir -p work
          cd work

          if [ -n "${{ inputs.zip_url }}" ]; then
            echo "MODE: zip_url"
            curl -L --fail --retry 5 --retry-delay 3 --retry-all-errors \
              -o project.zip "${{ inputs.zip_url }}"
          elif [ -n "${{ inputs.zip_path }}" ]; then
            echo "MODE: zip_path"
            cp "../${{ inputs.zip_path }}" project.zip
          else
            echo "ERROR: zip_url atau zip_path wajib diisi."
            exit 1
          fi

          if [ ! -s project.zip ]; then
            echo "ERROR: project.zip kosong / gagal didownload."
            exit 1
          fi

          unzip -q project.zip -d extracted

          FLUTTER_ROOT=""
          if [ -f "extracted/pubspec.yaml" ]; then
            FLUTTER_ROOT="extracted"
          else
            FOUND=$(find extracted -maxdepth 3 -name "pubspec.yaml" | head -n 1)
            if [ -n "$FOUND" ]; then
              FLUTTER_ROOT="$(dirname "$FOUND")"
            fi
          fi

          if [ -z "$FLUTTER_ROOT" ]; then
            echo "ERROR: pubspec.yaml tidak ditemukan dalam zip."
            echo "Isi zip:"
            find extracted -maxdepth 3
            exit 1
          fi

          echo "Flutter root: $FLUTTER_ROOT"
          cp -r "$FLUTTER_ROOT" project

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter pub get
        working-directory: work/project
        run: flutter pub get

      - name: Patch known-incompatible old packages
        working-directory: work/project
        run: |
          if grep -q "font_awesome_flutter" pubspec.yaml; then
            echo "🔧 Upgrading font_awesome_flutter (final IconData fix)..."
            flutter pub upgrade font_awesome_flutter --major-versions || true
          fi
        shell: bash

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: work/project
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build APK (release)
        if: ${{ inputs.build_type != 'debug' }}
        working-directory: work/project
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: flutter build apk --release --no-tree-shake-icons

      - name: Collect outputs
        run: |
          set -e
          mkdir -p out

          APK_PATH=$(find work/project/build -type f -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK hasil build tidak ditemukan."
            find work/project/build -type f -name "*.apk" || true
            exit 1
          fi

          echo "APK found: $APK_PATH"
          cp "$APK_PATH" "out/app-${{ inputs.build_type }}-${{ inputs.job_id }}.apk"

          ls -lh out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: out/*.apk
          retention-days: 7
          compression-level: 0
          if-no-files-found: error
