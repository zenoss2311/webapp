name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file project Flutter'
        required: true
        type: string
      tag:
        description: 'Tag build'
        required: false
        type: string
        default: 'build-manual'
      build_type:
        description: 'Tipe build'
        required: true
        type: choice
        options:
          - debug
          - release
        default: 'release'

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 1. Setup Java
      # ==========================================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ==========================================
      # 2. Setup Android SDK (dengan auto accept license)
      # ==========================================
      - name: Setup Android SDK
        run: |
          # Install Android SDK
          sudo apt-get update
          sudo apt-get install -y wget unzip
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -o -q commandlinetools-linux-11076708_latest.zip -d android-sdk
          rm commandlinetools-linux-11076708_latest.zip
          
          # Set environment
          echo "ANDROID_HOME=${{ github.workspace }}/android-sdk" >> $GITHUB_ENV
          echo "${{ github.workspace }}/android-sdk/cmdline-tools/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/android-sdk/platform-tools" >> $GITHUB_PATH
          
          # Accept semua licenses secara otomatis (YAKIN INI BEKERJA!)
          yes | ${{ github.workspace }}/android-sdk/cmdline-tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Install platform dan build tools
          ${{ github.workspace }}/android-sdk/cmdline-tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          
          echo "✅ Android SDK setup complete"

      # ==========================================
      # 3. Setup Flutter
      # ==========================================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ==========================================
      # 4. Download project ZIP
      # ==========================================
      - name: Download project ZIP
        run: |
          echo "📥 Downloading from: ${{ inputs.zip_url }}"
          curl -L -o project.zip "${{ inputs.zip_url }}"
          if [ ! -f project.zip ]; then
            echo "❌ Failed to download"
            exit 1
          fi
          echo "✅ Downloaded: $(ls -lh project.zip)"

      # ==========================================
      # 5. Extract project (Fix ZIP extra bytes)
      # ==========================================
      - name: Extract project
        run: |
          mkdir -p project
          
          # Coba unzip dengan ignore warning
          if unzip -o -q project.zip -d project/ 2>/dev/null; then
            echo "✅ Project extracted successfully"
          else
            echo "⚠️ Unzip warning, trying fallback..."
            
            # Fallback: skip extra bytes
            tail -c +161 project.zip > project_clean.zip 2>/dev/null || true
            unzip -o -q project_clean.zip -d project/ 2>/dev/null || true
            rm -f project_clean.zip
          fi
          
          rm -f project.zip
          echo "📂 Project files:"
          ls -la project/

      # ==========================================
      # 6. Validate Flutter project
      # ==========================================
      - name: Validate Flutter project
        run: |
          cd project
          if [ ! -f pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            ls -la
            exit 1
          fi
          echo "✅ pubspec.yaml found"
          
          # Cek main.dart
          if [ ! -f lib/main.dart ]; then
            echo "⚠️ lib/main.dart not found!"
          else
            echo "✅ lib/main.dart found"
          fi

      # ==========================================
      # 7. Get Flutter dependencies
      # ==========================================
      - name: Get dependencies
        run: |
          cd project
          flutter pub get
          echo "✅ Dependencies installed"

      # ==========================================
      # 8. Build APK
      # ==========================================
      - name: Build APK
        id: build
        run: |
          cd project
          
          if [ "${{ inputs.build_type }}" == "release" ]; then
            echo "🚀 Building RELEASE APK..."
            flutter build apk --release --split-per-abi
          else
            echo "🐞 Building DEBUG APK..."
            flutter build apk --debug
          fi
          
          # Cek hasil
          if [ "${{ inputs.build_type }}" == "release" ]; then
            APK_PATH="build/app/outputs/apk/release"
          else
            APK_PATH="build/app/outputs/apk/debug"
          fi
          
          if [ -d "$APK_PATH" ] && [ "$(ls -A $APK_PATH)" ]; then
            echo "✅ Build successful!"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "📦 APK files:"
            ls -la $APK_PATH
          else
            echo "❌ Build failed - no APK found"
            exit 1
          fi

      # ==========================================
      # 9. Upload APK as artifact
      # ==========================================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: project/${{ steps.build.outputs.apk_path }}
          retention-days: 7
          if-no-files-found: error

      # ==========================================
      # 10. Upload to GitHub Release (optional)
      # ==========================================
      - name: Upload to GitHub Release
        if: inputs.tag != 'build-manual'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          name: Build ${{ inputs.tag }}
          body: |
            ## Flutter APK Build
            - **Type:** ${{ inputs.build_type }}
            - **Tag:** ${{ inputs.tag }}
            - **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          files: project/${{ steps.build.outputs.apk_path }}/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
