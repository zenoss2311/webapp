name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Direct download URL to the project ZIP (GitHub release asset)"
        required: true
        type: string
      tag:
        description: "Build tag (used for naming/logging)"
        required: true
        type: string
      build_type:
        description: "Build type: debug or release"
        required: true
        default: "release"
        type: string
      flutter_version:
        description: "Flutter SDK version (leave default for latest stable)"
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter (custom version)
        if: ${{ inputs.flutter_version != '' }}
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ inputs.flutter_version }}
          cache: true

      - name: Set up Flutter (latest stable)
        if: ${{ inputs.flutter_version == '' }}
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Download project ZIP
        run: |
          echo "📥 Downloading project from: ${{ inputs.zip_url }}"
          curl -L -f --retry 3 --retry-delay 3 -o project.zip "${{ inputs.zip_url }}"

          echo "🔍 Validating ZIP file..."
          if ! file project.zip | grep -q "Zip archive"; then
            echo "❌ File is not a valid ZIP archive!"
            file project.zip
            echo "📄 First 500 bytes of downloaded file (for debugging):"
            head -c 500 project.zip
            exit 1
          fi

          SIZE=$(du -h project.zip | cut -f1)
          echo "📏 ZIP size: $SIZE"
        shell: bash

      - name: Extract ZIP and locate Flutter project
        run: |
          mkdir -p project
          echo "📦 Extracting ZIP..."
          if ! unzip -q project.zip -d project/; then
            echo "❌ Failed to extract ZIP!"
            exit 1
          fi

          echo "📂 Top-level contents:"
          ls -la project/

          PUBSPEC_DIR=$(find project -maxdepth 3 -name "pubspec.yaml" -printf '%h\n' | head -n 1)

          if [ -z "$PUBSPEC_DIR" ]; then
            echo "❌ pubspec.yaml not found anywhere in the ZIP!"
            echo "📂 Full tree (depth 3):"
            find project -maxdepth 3
            exit 1
          fi

          echo "✅ Found pubspec.yaml at: $PUBSPEC_DIR"

          shopt -s dotglob
          cp -r "$PUBSPEC_DIR"/* ./
          shopt -u dotglob

          rm -rf project project.zip

          echo "📂 Final workspace root:"
          ls -la
        shell: bash

      - name: Verify pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found in workspace root after copy!"
            exit 1
          fi
          echo "✅ pubspec.yaml confirmed:"
          cat pubspec.yaml | head -20
        shell: bash

      - name: Flutter pub get
        run: flutter pub get

      - name: Patch known-incompatible old packages
        run: |
          if grep -q "font_awesome_flutter" pubspec.yaml; then
            echo "🔧 Upgrading font_awesome_flutter (old versions break on newer Dart's final IconData)..."
            flutter pub upgrade font_awesome_flutter --major-versions || true
          fi
        shell: bash

      - name: Build APK (debug)
        if: ${{ inputs.build_type == 'debug' }}
        run: flutter build apk --debug

      - name: Build APK (release)
        if: ${{ inputs.build_type != 'debug' }}
        run: flutter build apk --release

      - name: Locate built APK
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK file found after build!"
            find build -name "*.apk" || true
            exit 1
          fi
          echo "✅ APK found at: $APK_PATH"
          mkdir -p output
          cp "$APK_PATH" output/
          echo "📏 APK info:"
          ls -la output/
        shell: bash

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: output/*.apk
          retention-days: 1
          if-no-files-found: error
